# ffmrust.rustify.app → video-platform-app on port 5004
# FLOW: Browser → Cloudflare → nginx:80/443 → localhost:5004 (Docker app)
#
# Setup (one-time on server):
#   1. Generate SSL cert:
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/nginx/ssl/ffmrust-selfsigned.key \
#        -out /etc/nginx/ssl/ffmrust-selfsigned.crt \
#        -subj '/CN=ffmrust.rustify.app'
#   2. cp nginx_vhost_ffmrust.conf /etc/nginx/sites-available/ffmrust.rustify.app
#   3. ln -s /etc/nginx/sites-available/ffmrust.rustify.app /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name ffmrust.rustify.app;

    # Large uploads — video files can be several GB
    client_max_body_size 4096m;

    location / {
        proxy_pass         http://localhost:5004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;

        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /health {
        access_log off;
        proxy_pass http://localhost:5004/health;
    }
}

server {
    listen 443 ssl;
    server_name ffmrust.rustify.app;

    # Self-signed cert — Cloudflare terminates public SSL (mode: Full)
    ssl_certificate     /etc/nginx/ssl/ffmrust-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/ffmrust-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Large uploads — video files can be several GB
    client_max_body_size 4096m;

    location / {
        proxy_pass         http://localhost:5004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;

        proxy_connect_timeout  30s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location /health {
        access_log off;
        proxy_pass http://localhost:5004/health;
    }
}
